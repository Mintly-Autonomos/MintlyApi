name: MintlyApi CI

on:
  pull_request:
  push:
    branches:
      - main
      - develop

concurrency:
  group: mintlyapi-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Quality Checks
    runs-on: ubuntu-latest
    env:
      API_URL: ${{ secrets.API_URL }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup npm
        run: npm install --global npm@11.11.0

      - name: Install dependencies
        run: npm ci

      - name: ESLint
        run: npm run lint

      - name: TypeScript check
        run: npm run typecheck

      - name: Unit tests
        run: npm run test:ci

      - name: Build
        run: npm run build

      - name: Validate Swagger
        run: npm run validate:swagger

  yaml-lint:
    name: YAML Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Lint YAML files
        uses: ibiqlik/action-yamllint@v3
        with:
          config_file: .yamllint.yml
          file_or_dir: .
